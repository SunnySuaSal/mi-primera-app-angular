<form class="form" [formGroup]="form" (ngSubmit)="submit()">
  <input type="text" placeholder="County Name" formControlName="name"/>
  <input type="text" placeholder="Capital" formControlName="capital"/>

  <select formControlName="region">
    @for (region of regions; track region) {
    <option [value]="region">
      {{region}}
    </option>
    }
  </select>

  <input type="number" placeholder="Population" formControlName="population"/>
  <input type="text" placeholder="Flag URL" formControlName="flag"/>

  <button type="submit">
    Add Country
  </button>
</form>
